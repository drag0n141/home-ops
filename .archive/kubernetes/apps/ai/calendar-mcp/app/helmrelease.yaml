---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calendar-mcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      calendar-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository:
              tag:
            env:
              TZ: ${TIMEZONE}
              GOOGLE_OAUTH_CREDENTIALS: /app/gcp-oauth.keys.json
              TRANSPORT: http
              HOST: 0.0.0.0
              PORT: &port 3000
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        labels:
          mcp.home.arpa/server: "true"
        ports:
          http:
            appProtocol: kgateway.dev/mcp
            port: *port
    route:
      app:
        parentRefs:
          - name: agentgateway-mcp
            namespace: ai
        rules:
          - backendRefs:
              - name: agentgateway-mcp
                group: agentgateway.dev
                kind: AgentgatewayBackend
    persistence:
      oauth:
        type: secret
        name: "{{ .Release.Name }}-secret"
        defaultMode: 0400
        globalMounts:
          - path: /app/gcp-oauth.keys.json
            subPath: gcp-oauth.keys
            readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /home/nodejs/.config/google-calendar-mcp
