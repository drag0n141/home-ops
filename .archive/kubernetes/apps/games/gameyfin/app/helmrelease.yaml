---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gameyfin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      gameyfin:
        labels:
          nfsMount: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gameyfin/gameyfin
              tag: 2.4.0@sha256:857730f1807a92dad1a7bb50e1ba5409e0f27119a2207374045a8f52b4a42cc5
            env:
              TZ: ${TIMEZONE}
              PUID: 1000
              PGID: 1000
              APP_URL: https://gameyfin.${SECRET_DOMAIN_INTERNAL}
            envFrom:
              - secretRef:
                  name: gameyfin-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 10m
                memory: 1Gi
              limits:
                memory: 3500Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN_INTERNAL}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          gameyfin:
            app:
              - path: /opt/gameyfin/data
                subPath: data
              - path: /opt/gameyfin/db
                subPath: db
              - path: /opt/gameyfin/plugindata
                subPath: plugin
      games:
        type: nfs
        server: nas01.${SECRET_DOMAIN_INT}
        path: /mnt/data/spiele
        globalMounts:
          - path: /mnt/data/spiele
      tmpfs:
        type: emptyDir
        advancedMounts:
          gameyfin:
            app:
              - path: /opt/gameyfin/logs
                subPath: logs
              - path: /tmp
                subPath: tmp
