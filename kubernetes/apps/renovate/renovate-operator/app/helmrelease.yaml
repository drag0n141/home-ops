---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  values:
    fullnameOverride: renovate-operator
    route:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
      hostnames:
        - renovate.${SECRET_DOMAIN_INTERNAL}
      parentRefs:
        - name: envoy-internal
          namespace: networking
    webhook:
      enabled: true
