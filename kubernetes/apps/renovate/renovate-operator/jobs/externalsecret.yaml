---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: drag0n141-bot-pem
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: drag0n141-bot-pem-secret
    template:
      data:
        private_key_pem: |-
          {{ .GITHUB_DRAG0N141_BOT_PRIVATE_KEY }}
  dataFrom:
    - extract:
        key: github
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: dockerhub-secret
    template:
      data:
        DOCKERHUB_TOKEN: "{{ .DOCKERHUB_TOKEN }}"
        DOCKERHUB_USERNAME: "{{ .DOCKERHUB_USERNAME }}"
  dataFrom:
    - extract:
        key: dockerhub
