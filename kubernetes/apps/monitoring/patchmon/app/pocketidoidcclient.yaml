---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: patchmon
spec:
  name: Patchmon
  callbackUrls:
    - "https://patchmon.${SECRET_DOMAIN_INTERNAL}/api/v1/auth/oidc/callback"
  allowedUserGroups:
    - name: id-admin
      namespace: security
  secret:
    keys:
      clientID: OIDC_CLIENT_ID
      clientSecret: OIDC_CLIENT_SECRET
