---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: patchmon
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      patchmon:
        labels:
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
              - secretRef:
                  name: "{{ .Release.Name }}-oidc-credentials"
        containers:
          app:
            image:
              repository: ghcr.io/patchmon/patchmon-server
              tag: 2.0.2@sha256:eaa1bcce290c7003cff01a96cfc893a64cb144e582e9b797875e6381f56b297a
            env:
              TZ: ${TIMEZONE}
              CORS_ORIGIN: https://patchmon.${SECRET_DOMAIN_INTERNAL}
              PORT: &port 3001
              OIDC_ENABLED: true
              OIDC_DISABLE_LOCAL_AUTH: true
              OIDC_BUTTON_TEXT: Login with Pocket ID
              OIDC_ISSUER_URL: https://id.${SECRET_DOMAIN}
              OIDC_REDIRECT_URI: https://patchmon.${SECRET_DOMAIN_INTERNAL}/api/v1/auth/oidc/callback
              OIDC_SUPERADMIN_GROUP: ID-Admin
              REDIS_HOST: dragonfly.database.svc.cluster.local
              REDIS_PORT: 6379
              REDIS_DB: 2
              TRUST_PROXY: true
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1024Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
      frontend:
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN_INTERNAL}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
        rules:
          - backendRefs:
              - identifier: frontend
                port: http
    persistence:
      agents:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          patchmon:
            app:
              - path: /app/agents
      tmpfs:
        type: emptyDir
        advancedMounts:
          patchmon:
            app:
              - path: /tmp
                subPath: tmp
            frontend:
              - path: /etc/nginx/conf.d
                subPath: nginx
              - path: /tmp
                subPath: tmp
