---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: checkmk
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      checkmk:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/checkmk/check-mk-raw
              tag: 2.4.0p25@sha256:1072442ab9be10c0564cc2aca5737164361789d616e616dde79a29666a256be2
            env:
              TZ: ${TIMEZONE}
              CMK_SITE_ID: checkmk
              MAIL_RELAY_HOST: mailrise.default.svc.cluster.local:8025
            envFrom:
              - secretRef:
                  name: checkmk-secret
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 5Gi
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        annotations:
          pangolin-operator/site-ref: k8s
          pangolin-operator/auth-sso: "true"
          pangolin-operator/auth-sso-idp: "1"
          pangolin-operator/full-domain: "checkmk.${SECRET_DOMAIN_PANGOLIN}"
        forceRename: "{{ .Release.Name }}"
        primary: true
        ports:
          http:
            port: 5000
      agent:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "checkmk-agent.${SECRET_DOMAIN_INTERNAL}"
          lbipam.cilium.io/ips: 192.168.222.115
        ports:
          agent:
            port: 8000
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://checkmk.${SECRET_DOMAIN_INTERNAL}/checkmk/check_mk
        hostnames:
          - "checkmk.${SECRET_DOMAIN_INTERNAL}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /omd/sites
      backups:
        type: nfs
        server: nas01.${SECRET_DOMAIN_INT}
        path: /mnt/data/backup/checkmk
        globalMounts:
          - path: /backups
      tmpfs:
        type: emptyDir
        medium: Memory
        globalMounts:
          - path: /opt/omd/sites/cmk/tmp
