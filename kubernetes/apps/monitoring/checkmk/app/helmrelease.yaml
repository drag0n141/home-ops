---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: checkmk
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      checkmk:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/checkmk/check-mk-raw
              tag: 2.4.0p24@sha256:2f02ae5cf8c539170138516938cc4f4e4f9c7d7de8144c328608ec779e95a410
            env:
              TZ: ${TIMEZONE}
              CMK_SITE_ID: checkmk
            envFrom:
              - secretRef:
                  name: checkmk-secret
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{ .Release.Name }}"
        primary: true
        ports:
          http:
            port: 5000
      agent:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "checkmk-agent.${SECRET_DOMAIN_INTERNAL}"
          lbipam.cilium.io/ips: 192.168.222.115
        ports:
          agent:
            port: 8000
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://checkmk.${SECRET_DOMAIN_INTERNAL}/checkmk/check_mk
        hostnames:
          - "checkmk.${SECRET_DOMAIN_INTERNAL}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /omd/sites
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /opt/omd/sites/cmk/tmp
