---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus-sidecar
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gatus-sidecar
  values:
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      - name: init-db
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
        envFrom: &envFrom
          - secretRef:
              name: "{{ .Release.Name }}-secret"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: Europe/Berlin
      envFrom: *envFrom
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
      hostnames:
        - "status.${SECRET_DOMAIN_INTERNAL}"
      parentRefs:
        - name: envoy-internal
          namespace: networking
    monitoring:
      serviceMonitor:
        enabled: true
    config:
      existingConfigMap: "{{ .Release.Name }}-configmap"
      items:
        - key: config.yaml
          path: config.yaml
    resources:
      requests:
        cpu: 100m
      limits:
        memory: 512Mi
