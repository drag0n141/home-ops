---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zerobyte-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      zerobyte-exporter:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          pip-install:
            image:
              repository: public.ecr.aws/docker/library/python
              tag: 3.14-slim@sha256:6ee6162a8be9acda126af13593acd1fda2c0f3318d6f539087230c03b7408ccb
            command:
              - pip
              - install
              - "--target=/pip-packages"
              - "prometheus_client>=0.25.0"
              - "requests>=2.31.0"
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/python
              tag: 3.14-slim@sha256:6ee6162a8be9acda126af13593acd1fda2c0f3318d6f539087230c03b7408ccb
            command: ["python", "/scripts/zerobyte-exporter.py"]
            env:
              PYTHONPATH: /pip-packages
              EXPORTER_PORT: &port 9876
              SCRAPE_INTERVAL: "60"
              ZEROBYTE_URL: https://zerobyte.${SECRET_DOMAIN_INT}
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    persistence:
      script:
        type: configMap
        name: "{{ .Release.Name }}-scripts"
        globalMounts:
          - path: /scripts/zerobyte-exporter.py
            subPath: zerobyte-exporter.py
            readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          zerobyte-exporter:
            app:
              - path: /pip-packages
                subPath: pip-packages
              - path: /tmp
                subPath: tmp
            pip-install:
              - path: /pip-packages
                subPath: pip-packages
              - path: /tmp
                subPath: tmp-pip
