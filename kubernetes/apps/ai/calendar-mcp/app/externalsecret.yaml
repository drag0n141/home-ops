---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: calendar-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: calendar-mcp-secret
    template:
      data:
        gcp-oauth.keys.json: |-
          {{ .OPENCLAW_GOOGLE_TOKEN }}
  dataFrom:
    - extract:
        key: google
