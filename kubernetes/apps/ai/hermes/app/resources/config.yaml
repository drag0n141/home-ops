custom_providers:
  - name: minimax
    base_url: https://api.minimax.io/v1
    key_env: MINIMAX_API_KEY
    models:
      MiniMax-M2.7:
        context_length: 204800
      MiniMax-M2.7-highspeed:
        context_length: 204800
model:
  default: "MiniMax-M2.7"
  provider: custom:minimax
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
  env_passthrough:
    - PLEX_TOKEN
    - PLEX_URL
memory:
  auto_migrate: true
  auto_summarize:
    threshold: 50
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
group_sessions_per_user: false
streaming:
  enabled: false
security:
  redact_secrets: true
  tirith_enabled: true
  tirith_fail_open: true
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 2
  reasoning_effort: medium
  tool_use_enforcement: auto
mcp_servers:
  homelab:
    url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
web:
  search_backend: searxng
