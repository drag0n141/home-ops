model:
  default: kimi-k2.6
  provider: custom:kubernetes
  base_url: http://litellm.ai.svc.cluster.local:4000/v1
  api_key: ${LITELLM_API_KEY}
fallback_providers:
  - provider: custom:kubernetes
    model: qwen3.6-plus
  - provider: custom:kubernetes
    model: glm-5.1
  - provider: custom:kubernetes
    model: qwen-local
providers:
  kubernetes:
    base_url: http://litellm.ai.svc.cluster.local:4000/v1
    api_key: ${LITELLM_API_KEY}
toolsets:
  - hermes-cli
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
  env_passthrough:
    - PLEX_TOKEN
    - PLEX_URL
memory:
  auto_migrate: true
  auto_summarize:
    threshold: 50
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
group_sessions_per_user: false
streaming:
  enabled: false
security:
  redact_secrets: true
  tirith_enabled: true
  tirith_fail_open: true
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 2
  reasoning_effort: medium
  tool_use_enforcement: auto
mcp_servers:
  homelab:
    url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
web:
  search_backend: searxng
whatsapp:
  unauthorized_dm_behavior: ignore
