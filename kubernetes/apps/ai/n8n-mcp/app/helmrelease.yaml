---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n-mcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      n8n-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/czlonkowski/n8n-mcp
              tag: 2.35.6@sha256:34b5e229c1d1af9b037d0caa2341563ec6cee84e4990081d3cd63775d458cdcf
            env:
              TZ: ${TIMEZONE}
              MCP_MODE: http
              N8N_MCP_TELEMETRY_DISABLED: true
              N8N_MODE: true
              N8N_API_URL: https://n8n.${SECRET_DOMAIN_INTERNAL}
              PORT: &port 3000
            envFrom:
              - secretRef:
                  name: n8n-mcp-secret
            resources:
              requests:
                cpu: 50m
                memory: 100Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    service:
      app:
        ports:
          http:
            appProtocol: kgateway.dev/mcp
            port: *port
    route:
      app:
        parentRefs:
          - name: agentgateway-mcp
            namespace: ai
        rules:
          - backendRefs:
              - name: agentgateway-mcp
                group: agentgateway.dev
                kind: AgentgatewayBackend
