---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway
spec:
  authServerConfig:
    issuer: https://mcp.${SECRET_DOMAIN}
    signingKeySecretRefs:
      - name: toolhive-secret
        key: signing-key
    hmacSecretRefs:
      - name: toolhive-secret
        key: hmac-key
    tokenLifespans:
      accessTokenLifespan: 1h
      refreshTokenLifespan: 168h
      authCodeLifespan: 10m
    upstreamProviders:
      - name: pocket-id
        type: oidc
        oidcConfig:
          issuerUrl: https://id.${SECRET_DOMAIN}
          clientId: 76635c1d-32e2-4957-9356-c30f0185d8ae
          clientSecretRef:
            name: toolhive-oidc-credentials
            key: client_secret
          redirectUri: https://mcp.${SECRET_DOMAIN}/oauth/callback
          scopes:
            - openid
            - profile
            - email
  groupRef:
    name: mcp-tools
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: mcp-gateway-oidc
      audience: https://mcp.${SECRET_DOMAIN}/mcp
      resourceUrl: https://mcp.${SECRET_DOMAIN}/mcp
  outgoingAuth:
    source: discovered
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          env:
            - name: INSECURE_DISABLE_URL_VALIDATION
              value: "true"
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-internal
spec:
  groupRef:
    name: mcp-tools
  config:
    groupRef: mcp-tools
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: discovered
