---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: toolhive
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: toolhive-secret
    template:
      data:
        # App
        signing-key: |-
          "{{ .TOOLHIVE_SIGNING_KEY }}"
        hmac-key: "{{ .TOOLHIVE_HMAC_KEY }}"
        # OIDC
        client-secret: "{{ .TOOLHIVE_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: pocket-id
    - extract:
        key: toolhive
