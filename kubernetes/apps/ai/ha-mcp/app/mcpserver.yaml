---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: ha-mcp
spec:
  image: ghcr.io/homeassistant-ai/ha-mcp:7.3.0
  transport: streamable-http
  groupRef:
    name: mcp-tools
  env:
    - name: HOMEASSISTANT_URL
      value: http://haos.${SECRET_DOMAIN_INT}:8123
  secrets:
    - name: ha-mcp-secret
      key: HOMEASSISTANT_TOKEN
  podTemplateSpec:
    spec:
      containers:
        - name: mcp
          command:
            - ha-mcp-web
