---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: context7-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: context7-mcp-secret
    template:
      data:
        CONTEXT7_API_KEY: "{{ .CONTEXT7_API_KEY }}"
  dataFrom:
    - extract:
        key: context7
