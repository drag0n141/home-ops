---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng-mcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      searxng-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/isokoliuk/mcp-searxng
              tag: 0.10.5@sha256:30e39ee931e434ceee7ec57922894526c5d46486ab92570ee0de7b5477e4ca12
            env:
              TZ: ${TIMEZONE}
              SEARXNG_URL: http://searxng.default.svc.cluster.local:8080
              MCP_HTTP_PORT: &port 3000
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    service:
      app:
        labels:
          mcp.home.arpa/server: "true"
        ports:
          http:
            appProtocol: kgateway.dev/mcp
            port: *port
    route:
      app:
        parentRefs:
          - name: agentgateway-mcp
            namespace: ai
        rules:
          - backendRefs:
              - name: agentgateway-mcp
                group: agentgateway.dev
                kind: AgentgatewayBackend
