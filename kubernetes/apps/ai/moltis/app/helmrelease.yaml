---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: moltis
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      moltis:
        labels:
          nfsMount: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          daemon:
            image:
              repository: quay.io/podman/stable
              tag: v5.8.1@sha256:080edf4fe511fa8493f1ed0b86bd71e7b2805a1ff5343037d4f6173c870d7e35
            restartPolicy: Always
            command:
              - podman
              - system
              - service
              - --time=0
              - unix:///var/run/docker.sock
            securityContext:
              privileged: true
        containers:
          app:
            image:
              repository: ghcr.io/moltis-org/moltis
              tag: 0.10.18@sha256:b155dd370fd26d5ea7286ea41011fcfec5ea6effd93486dd0809e310f02ec9bc
            env:
              DOCKER_HOST: tcp://localhost:2376
              MOLTIS_NO_TLS: true
              MOLTIS_BEHIND_PROXY: true
              MOLTIS_CONFIG_DIR: /config
              MOLTIS_DATA_DIR: /data
              MOLTIS_PROVIDER: minimax
              MOLTIS_WEBAUTHN_RP_ID: "{{ .Release.Name }}.${SECRET_DOMAIN_INTERNAL}"
              MOLTIS_WEBAUTHN_ORIGIN: "https://{{ .Release.Name }}.${SECRET_DOMAIN_INTERNAL}"
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: moltis-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 13131
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probe
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN_INTERNAL}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
            subPath: config
          - path: /data
            subPath: data
      data:
        type: nfs
        server: nas01.${SECRET_DOMAIN_INT}
        path: /mnt/data/openclaw
        globalMounts:
          - path: /nfs-data
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /home/moltis/.docker
            subPath: home
          - path: /tmp
            subPath: tmp
