---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: github-mcp-secret
    template:
      data:
        GITHUB_PERSONAL_ACCESS_TOKEN: "{{ .OPENCLAW_GH_TOKEN }}"
  dataFrom:
    - extract:
        key: github
