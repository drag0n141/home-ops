---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: n8n-mcp-secret
    template:
      data:
        N8N_API_KEY: "{{ .N8N_MCP_API_KEY }}"
  dataFrom:
    - extract:
        key: n8n
