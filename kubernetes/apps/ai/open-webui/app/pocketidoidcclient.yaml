---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: open-webui
spec:
  name: Open-WebUI
  callbackUrls:
    - "https://chat.${SECRET_DOMAIN}/oauth/oidc/callback"
  allowedUserGroups:
    - name: id-admin
      namespace: security
  secret:
    keys:
      clientID: OAUTH_CLIENT_ID
      clientSecret: OAUTH_CLIENT_SECRET
