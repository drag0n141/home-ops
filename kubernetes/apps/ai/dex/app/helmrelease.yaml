---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: dex
  values:
    replicaCount: 1
    image:
      repository: ghcr.io/dexidp/dex
      tag: v2.45.1@sha256:8499afd690c437f52301efd2b05b2455da5bd2dfc20332cd697dc9937f808462
    envFrom:
      - secretRef:
          name: dex-secret
    grpc:
      enabled: true
    config:
      issuer: https://mcp-dex.${SECRET_DOMAIN}
      storage:
        type: kubernetes
        config:
          inCluster: true
      web:
        http: 0.0.0.0:5556
      grpc:
        addr: 0.0.0.0:5557
      connectors:
        - type: oidc
          id: pocketid
          name: pocketid
          config:
            issuer: https://id.${SECRET_DOMAIN}
            clientID: $MCP_DEX_OAUTH_CLIENT_ID
            clientSecret: $MCP_DEX_OAUTH_CLIENT_SECRET
            redirectURI: https://mcp-dex.${SECRET_DOMAIN}/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            getUserInfo: true
            insecureEnableGroups: true
      oauth2:
        skipApprovalScreen: true
        alwaysShowLoginScreen: false
        grantTypes:
          - authorization_code
          - refresh_token
    service:
      ports:
        http:
          port: 5556
        grpc:
          port: 5557
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities: { drop: ["ALL"] }
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    volumes:
      - name: tmp
        emptyDir: {}
