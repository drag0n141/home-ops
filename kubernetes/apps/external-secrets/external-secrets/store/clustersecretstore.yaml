---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: k8s
spec:
  provider:
    kubernetes:
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: security
          key: ca.crt
      auth:
        serviceAccount:
          name: external-secrets-k8s
          namespace: external-secrets
