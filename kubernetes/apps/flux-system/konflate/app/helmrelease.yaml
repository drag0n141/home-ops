---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: konflate
  values:
    config:
      repo: github://drag0n141/home-ops
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      parentRefs:
        - name: envoy-internal
          namespace: networking
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN_INTERNAL}"
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        cpu: 4000m
        memory: 4Gi
