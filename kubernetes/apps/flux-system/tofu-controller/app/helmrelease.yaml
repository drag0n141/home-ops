---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tofu-controller
  values:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 1m
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.12.0@sha256:b4d10d9c80dab17fa291b0238c0ed6866e6759b509115fb76363fb155d177452
