---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: migadu
spec:
  interval: 12h
  approvePlan: auto
  backendConfig:
    customConfiguration: |
      backend "s3" {
        bucket   = "terraform"
        key      = "migadu/migadu.tfstate"
        region   = "us-east-1"
        endpoints = {
          s3 = "http://garage.storage.svc.cluster.local:3900"
        }

        skip_credentials_validation = true
        skip_requesting_account_id  = true
        skip_metadata_api_check     = true
        skip_region_validation      = true
        use_path_style              = true
        insecure                    = true
      }
  backendConfigsFrom:
    - kind: Secret
      name: terraform-backend-secret
  path: ./migadu
  sourceRef:
    kind: OCIRepository
    name: terraform
  varsFrom:
    - kind: Secret
      name: terraform-secret
