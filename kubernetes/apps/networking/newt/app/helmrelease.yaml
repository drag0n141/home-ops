---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: newt
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      newt:
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          newt-sidecar:
            image:
              repository: ghcr.io/home-operations/newt-sidecar
              tag: 0.1.0
            args:
              - --gateway-name=envoy-external
              - --enable-service
              - --auth-sso-idp=1
              - --site-id=informal-big-headed-mole-rat
              - --target-hostname=envoy-external.networking.svc.cluster.local
              - --deny-countries=RU,CN,KP,IR,BY,IL
            restartPolicy: Always
            resources:
              limits:
                memory: 128Mi
        containers:
          app:
            image:
              repository: ghcr.io/fosrl/newt
              tag: 1.10.2@sha256:c7b4f508cba35d698a3e4b2d55e3d902ae993d6588198291ef8e232d30421974
            env:
              BLUEPRINT_FILE: /etc/newt/blueprint.yaml
              PANGOLIN_ENDPOINT: https://pangolin.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 384Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    rbac:
      roles:
        newt:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "watch", "list"]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["httproutes"]
              verbs: ["get", "watch", "list"]
      bindings:
        newt:
          type: ClusterRoleBinding
          roleRef:
            identifier: newt
          subjects:
            - identifier: newt
    serviceAccount:
      newt: {}
    persistence:
      blueprint:
        type: emptyDir
        globalMounts:
          - path: /etc/newt
