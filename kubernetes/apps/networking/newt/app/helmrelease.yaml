---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: newt
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      newt:
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          newt-sidecar:
            image:
              repository: ghcr.io/home-operations/newt-sidecar
              tag: 0.2.1
            env:
              NEWTSC_SITE_ID:
                valueFrom:
                  secretKeyRef:
                    name: newt-secret
                    key: NEWTSC_SITE_NICEID
              NEWTSC_AUTH_SSO_IDP: 1
              NEWTSC_DENY_COUNTRIES: RU,CN,KP,IR,BY,IL
              NEWTSC_ENABLE_SERVCICE: true
              NEWTSC_GATEWAY_NAME: envoy-external
              NEWTSC_TARGET_HOSTNAME: envoy-external.networking.svc.cluster.local
            restartPolicy: Always
            resources:
              limits:
                memory: 128Mi
        containers:
          app:
            image:
              repository: ghcr.io/fosrl/newt
              tag: 1.10.3@sha256:41a269865ed59dc16a8412b292380b15bf506d2a3a386eca024ffb29e0d18cd5
            env:
              BLUEPRINT_FILE: /etc/newt/blueprint.yaml
              PANGOLIN_ENDPOINT: https://pangolin.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 384Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    rbac:
      roles:
        newt:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "watch", "list"]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["httproutes"]
              verbs: ["get", "watch", "list"]
      bindings:
        newt:
          type: ClusterRoleBinding
          roleRef:
            identifier: newt
          subjects:
            - identifier: newt
    serviceAccount:
      newt: {}
    persistence:
      blueprint:
        type: emptyDir
        globalMounts:
          - path: /etc/newt
