---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: gamevault
spec:
  name: Gamevault
  callbackUrls:
    - "https://gamevault.${SECRET_DOMAIN_INTERNAL}/api/auth/oauth2/login"
  allowedUserGroups:
    - name: id-admin
      namespace: security
    - name: id-gamevault
      namespace: security
  secret:
    keys:
      clientID: AUTH_OAUTH2_CLIENT_ID
      clientSecret: AUTH_OAUTH2_CLIENT_SECRET
