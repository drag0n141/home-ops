---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-gpu-resource-driver
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: intel-gpu-resource-driver
  values:
    cdi:
      staticPath: /run/cdi
      dynamicPath: /run/cdi
    kubeletPlugin:
      privileged: true
      healthMonitoring:
        enabled: false
