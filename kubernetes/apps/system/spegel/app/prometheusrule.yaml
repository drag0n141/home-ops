---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: spegel-highcpu
spec:
  groups:
    - name: spegel
      rules:
        - alert: SpegelHighCPU
          expr: |
            sum(rate(container_cpu_usage_seconds_total{
              namespace="system",
              pod=~"spegel-.*",
              container="spegel"
            }[5m])) by (pod) > 1.0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Spegel Pod {{ $labels.pod }} has sustained high CPU usage"
            description: |
              Pod {{ $labels.pod }} has been using more than 1 CPU core for over 15 minutes
              (current: {{ $value | humanize }} cores).
              Possible cause: Renovate run or OCI event flood on the node.
