---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: traccar
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: traccar-secret
    template:
      data:
        # Database
        DATABASE_URL: |-
          jdbc:postgresql://postgres-timescale-rw.database.svc.cluster.local:5432/{{ .TRACCAR_POSTGRES_DB }}
        DATABASE_USER: &dbuser "{{ .TRACCAR_POSTGRES_USER }}"
        DATABASE_PASSWORD: &dbpass "{{ .TRACCAR_POSTGRES_PASSWORD }}"
        # Postgres Init
        INIT_POSTGRES_DBNAME: "{{ .TRACCAR_POSTGRES_DB }}"
        INIT_POSTGRES_HOST: "postgres-timescale-rw.database.svc.cluster.local"
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
