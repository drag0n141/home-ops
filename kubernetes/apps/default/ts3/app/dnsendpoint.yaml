---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: ts3
spec:
  endpoints:
    - dnsName: "ts.${SECRET_DOMAIN}"
      recordType: CNAME
      targets: ["external.${SECRET_DOMAIN}"]
    - dnsName: "_ts3._udp.ts.${SECRET_DOMAIN}"
      recordType: SRV
      targets: ["0 5 9987 ts.${SECRET_DOMAIN}"]
