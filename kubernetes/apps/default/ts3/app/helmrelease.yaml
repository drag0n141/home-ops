---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ts3-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      ts3:
        labels:
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom: &envFrom
              - secretRef:
                  name: ts3-secret
        containers:
          app:
            image:
              repository: docker.io/teamspeak
              tag: 3.13.8@sha256:11fb1dd03c68ae7b3a8a86c5a08827d01d87a833177ad92ee5c19d7b72d08ce0
            env:
              TZ: Europe/Berlin
              TS3SERVER_DB_PLUGIN: ts3db_postgresql
              TS3SERVER_DB_SQLCREATEPATH: create_postgresql
              TS3SERVER_DB_WAITUNTILREADY: 30
              TS3SERVER_LICENSE: accept
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { add: ["CHOWN"], drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 50Mi
              limits:
                memory: 200Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "ts3.${SECRET_DOMAIN_INTERNAL}"
          lbipam.cilium.io/ips: 192.168.222.80
          pangolin-operator/enabled: "true"
          pangolin-operator/site-ref: k8s
          pangolin-operator/all-ports: "true"
        ports:
          voice:
            port: 9987
            protocol: UDP
          serverquery:
            port: 10011
            protocol: TCP
          filetransfer:
            port: 30033
            protocol: TCP
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /var/ts3server
      tmpfs:
        type: emptyDir
        advancedMounts:
          ts3:
            app:
              - path: var/ts3server/logs
                subPath: logs
              - path: /var/run/ts3server
                subPath: ts3server
              - path: /tmp
                subPath: tmp
