---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apprise
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: apprise-secret
    creationPolicy: Owner
    template:
      templateFrom:
        - configMap:
            name: apprise-configmap
            items:
              - key: apprise.yml
  dataFrom:
    - extract:
        key: gotify
