---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-gpt
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: paperless-gpt-secret
    template:
      data:
        PAPERLESS_API_TOKEN: '{{ .PAPERLESS_API_KEY }}'
        OPENAI_API_KEY: '{{ .MINIMAX_API_KEY }}'
  dataFrom:
    - extract:
        key: minimax
    - extract:
        key: paperless
