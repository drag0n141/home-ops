---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: paperless-oidc
spec:
  secretStoreRefs:
    - name: onepassword-connect
      kind: ClusterSecretStore
  selector:
    secret:
      name: paperless-oidc-credentials
  data:
    - match:
        secretKey: client_id
        remoteRef:
          remoteKey: pocket-id
          property: PAPERLESS_CLIENT_ID
    - match:
        secretKey: client_secret
        remoteRef:
          remoteKey: pocket-id
          property: PAPERLESS_CLIENT_SECRET
