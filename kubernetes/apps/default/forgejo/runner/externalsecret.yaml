---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-runner
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: forgejo-runner-secret
    template:
      data:
        RUNNER_TOKEN: "{{ .FORGEJO_RUNNER_TOKEN }}"
  dataFrom:
    - extract:
        key: forgejo
