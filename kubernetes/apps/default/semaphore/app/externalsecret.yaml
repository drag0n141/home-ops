---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: semaphore
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: semaphore-secret
    template:
      data:
        # App
        SEMAPHORE_ACCESS_KEY_ENCRYPTION: "{{ .SEMAPHORE_ACCESS_KEY_ENCRYPTION }}"
        SEMAPHORE_COOKIE_HASH: "{{ .SEMAPHORE_COOKIE_HASH }}"
        SEMAPHORE_COOKIE_ENCRYPTION: "{{ .SEMAPHORE_COOKIE_ENCRYPTION }}"
        # Database
        POSTGRES_USER: &dbuser "{{ .SEMAPHORE_POSTGRES_USER }}"
        POSTGRES_PASSWORD: &dbpass "{{ .SEMAPHORE_POSTGRES_PASSWORD }}"
        # Postgres Init
        INIT_POSTGRES_DBNAME: "{{ .SEMAPHORE_POSTGRES_DB }}"
        INIT_POSTGRES_HOST: "postgres-rw.database.svc.cluster.local"
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # OIDC
        OIDC_CLIENT_ID: "{{ .SEMAPHORE_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .SEMAPHORE_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: pocket-id
    - extract:
        key: semaphore
