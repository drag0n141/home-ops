---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: semaphore
spec:
  hostnames:
    - "semaphore.${SECRET_DOMAIN_INTERNAL}"
  parentRefs:
    - name: envoy-internal
      namespace: networking
  rules:
    - backendRefs:
        - name: semaphore
          namespace: default
          port: 3000
