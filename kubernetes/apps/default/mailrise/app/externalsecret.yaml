---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mailrise
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mailrise-secret
    template:
      data:
        GOTIFY_CHECKMK: "gotify://gotify.default.svc.cluster.local/{{ .GOTIFY_TOKEN_CHECKMK }}"
        GOTIFY_DB: "gotify://gotify.default.svc.cluster.local/{{ .GOTIFY_TOKEN_DB_BACKUP }}"
        GOTIFY_USV: "gotify://gotify.default.svc.cluster.local/{{ .GOTIFY_TOKEN_USV }}"
        GOTIFY_RESTIC: "gotify://gotify.default.svc.cluster.local/{{ .GOTIFY_TOKEN_RESTIC }}"
  dataFrom:
    - extract:
        key: gotify
