---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: tinyauth
spec:
  from:
    - &policy
      group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: ai
    - <<: *policy
      namespace: default
    - <<: *policy
      namespace: downloads
    - <<: *policy
      namespace: games
    - <<: *policy
      namespace: home
    - <<: *policy
      namespace: matrix
    - <<: *policy
      namespace: media
    - <<: *policy
      namespace: monitoring
    - <<: *policy
      namespace: networking
    - <<: *policy
      namespace: renovate
    - <<: *policy
      namespace: storage
    - <<: *policy
      namespace: tools
  to:
    - group: ''
      kind: Service
      name: tinyauth
