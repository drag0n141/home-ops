---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDInstance
metadata:
  name: &app pocket-id
spec:
  podTemplate:
    spec:
      initContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18
          envFrom:
            - secretRef:
                name: &secret pocket-id-secret
  image: ghcr.io/pocket-id/pocket-id:v2.8.0-distroless@sha256:6a3aad6023ea0729e3763c75b77060d6d5d9069ad566af0b0b14a2288da0c9e0
  timezone: "${TIMEZONE}"
  appUrl: "https://id.${SECRET_DOMAIN}"
  databaseUrl:
    valueFrom:
      secretKeyRef:
        name: *secret
        key: DB_CONNECTION_STRING
  encryptionKey:
    valueFrom:
      secretKeyRef:
        name: *secret
        key: ENCRYPTION_KEY
  env:
    - name: LDAP_USER_SEARCH_FILTER
      valueFrom:
        secretKeyRef:
          name: *secret
          key: LDAP_USER_SEARCH_FILTER
  ldap:
    url: "ldaps://ldap-lb.security.svc.cluster.local"
    base: "${SECRET_LDAP_BASE}"
    bindDN: "${SECRET_LDAP_BIND_DN}"
    bindPassword:
      valueFrom:
        secretKeyRef:
          name: *secret
          key: LDAP_BIND_PASSWORD
    skipCertVerify: true
    adminGroupName: "ID-Admin"
    userGroupSearchFilter: "(&(objectClass=group)(cn=ID*))"
    attributeMapping:
      userUniqueIdentifier: "objectGUID"
      groupUniqueIdentifier: "objectGUID"
      userFirstName: "givenName"
      userLastName: "sn"
      userUsername: "sAMAccountName"
      userEmail: "mail"
      groupMember: "member"
      groupName: "cn"
  smtp:
    host: "smtp-relay.networking.svc.cluster.local"
    port: 2525
    from: "pocket-id@${SECRET_DOMAIN}"
  geoip:
    dbPath: "/app/data/GeoLite2-City.mmdb"
    maxmindLicenseKey:
      valueFrom:
        secretKeyRef:
          name: *secret
          key: MAXMIND_LICENSE_KEY
  ui:
    sessionDuration: 43800
  userManagement:
    emailsVerified: true
  logging:
    level: "info"
  metrics:
    enabled: true
  analyticsDisabled: true
  versionCheckDisabled: true
  route:
    enabled: true
    parentRefs:
      - name: envoy-external
        namespace: networking
    hostnames:
      - "id.${SECRET_DOMAIN}"
  persistence:
    enabled: true
    existingClaim: *app
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 256Mi
