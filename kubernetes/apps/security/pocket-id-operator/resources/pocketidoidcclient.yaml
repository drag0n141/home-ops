---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: openpubkey-ssh
spec:
  name: OpenPubkey-SSH
  callbackUrls:
    - "http://localhost:3000/login-callback"
    - "http://localhost:10001/login-callback"
    - "http://localhost:11110/login-callback"
  isPublic: true
  pkceEnabled: true
  allowedUserGroups:
    - name: id-admin
      namespace: security
  logo:
    nameOverride: sshwifty
---
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDOIDCClient
metadata:
  name: pangolin
spec:
  name: Pangolin
  callbackUrls:
    - "https://pangolin.${SECRET_DOMAIN}/auth/idp/1/oidc/callback"
  allowedUserGroups:
    - name: id-admin
      namespace: security
