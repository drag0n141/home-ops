---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tubearchivist
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      tubearchivist:
        labels:
          nfsMount: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/bbilly1/tubearchivist
              tag: v0.5.10@sha256:dfe723cf008520e1758ecc3e59e6ea8761dd10d5bb099cd87289e80f5bd66567
            env:
              TZ: ${TIMEZONE}
              HOST_UID: 1000
              HOST_GID: 1000
              ENABLE_CAST: true
              ES_URL: http://tubearchivist-elasticsearch.media.svc.cluster.local:9200
              TA_HOST: https://{{ .Release.Name }}.${SECRET_DOMAIN_INTERNAL}
              TA_PORT: &port 8000
            envFrom:
              - secretRef:
                  name: tubearchivist-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN_INTERNAL}"
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      media:
        type: nfs
        server: nas01.${SECRET_DOMAIN_INT}
        path: /mnt/data/media
        advancedMounts:
          tubearchivist:
            app:
              - path: /youtube
                subPath: youtube
              - path: /cache
                subPath: youtube-cache
      tmpfs:
        type: emptyDir
        advancedMounts:
          tubearchivist:
            app:
              - path: /tmp
                subPath: tmp
