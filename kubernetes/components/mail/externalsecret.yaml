---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-migadu-token"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: "${APP}-migadu-token"
    template:
      data:
        MIGADU_USERNAME: "{{ .MIGADU_USERNAME }}"
        MIGADU_TOKEN: "{{ .TERRAFORM_MIGADU_TOKEN }}"
  dataFrom:
    - extract:
        key: migadu
