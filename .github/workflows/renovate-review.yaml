---
name: "Renovate PR Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: renovate-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI PR Review
    if: github.event.pull_request.user.login == 'drag0n141-bot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Analyze PR with reusable AI reviewer
        if: steps.version-check.outputs.skip_review != 'true'
        id: analyze
        uses: misospace/pr-reviewer-action@fbf128ba574db43ef6783c3d026bf59f9247c07c # v1.0.17
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          ai_base_url: https://opencode.ai/zen/go/v1
          ai_model: moonshot/kimi-k2.6
          ai_api_key: ${{ secrets.OPENCODE_API_KEY }}
          publish_review_comment: "true"
          system_prompt_file: .github/pr-review-prompt.md
